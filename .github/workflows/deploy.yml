name: Microservices Local CI/CD Pipeline

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    # THIS IS THE MAGIC WORD! It tells GitHub to use your Mac.
    runs-on: self-hosted 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Images
      # CHANGED: Added '-f path/to/Dockerfile .' to build from the root context
      run: |
        docker build -t tpvapi/api-gateway:${{ github.sha }} -f api-gateway/Dockerfile .
        docker push tpvapi/api-gateway:${{ github.sha }}
        
        docker build -t tpvapi/user-service:${{ github.sha }} -f user-service/Dockerfile .
        docker push tpvapi/user-service:${{ github.sha }}
        
        docker build -t tpvapi/order-service:${{ github.sha }} -f order-service/Dockerfile .
        docker push tpvapi/order-service:${{ github.sha }}

    - name: Update Kubernetes Manifests (macOS Version)
      run: |
        # Note: macOS uses a slightly different 'sed' syntax than Linux!
        sed -i '' "s|tpvapi/api-gateway:.*|tpvapi/api-gateway:${{ github.sha }}|g" k8s/api-gateway.yaml
        sed -i '' "s|tpvapi/user-service:.*|tpvapi/user-service:${{ github.sha }}|g" k8s/user-app.yaml
        sed -i '' "s|tpvapi/order-service:.*|tpvapi/order-service:${{ github.sha }}|g" k8s/order-app.yaml
        
    - name: Deploy to Local Kubernetes
      run: |
        # Because this is running on your Mac, kubectl is already authenticated to Docker Desktop!
        kubectl apply -f k8s/